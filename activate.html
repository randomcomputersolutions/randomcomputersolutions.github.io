<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get Activation Code — Random Computer Solutions</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Segoe UI, Arial, sans-serif; color: #1f2933; line-height: 1.6; background: #f2f6fb; min-height: 100vh; }
  .wrap { max-width: 460px; margin: 0 auto; padding: 30px 20px 60px; }
  .logo { width: 74px; height: 74px; background: #0b4a8b; border-radius: 20px; color: #fff; font-size: 28px; font-weight: 700; display: flex; align-items: center; justify-content: center; margin: 10px auto 14px; }
  h1 { font-size: 24px; text-align: center; color: #0b4a8b; }
  .sub { text-align: center; color: #6b7a89; font-size: 15px; margin-bottom: 26px; }
  .card { background: #fff; border: 1px solid #dde6f0; border-radius: 18px; padding: 22px; }
  label { display: block; font-size: 14px; color: #52606d; margin: 14px 0 6px; }
  input { width: 100%; padding: 13px 14px; font-size: 16px; border: 1px solid #c8d4e0; border-radius: 14px; outline: none; }
  input:focus { border-color: #0b4a8b; box-shadow: 0 0 0 3px #0b4a8b22; }
  button { width: 100%; margin-top: 22px; padding: 15px; font-size: 16px; font-weight: 600; color: #fff; background: #0b4a8b; border: none; border-radius: 14px; cursor: pointer; }
  button:hover { background: #0d5aa9; }
  button:disabled { background: #9fb3c8; cursor: default; }
  .msg { margin-top: 16px; padding: 12px 14px; border-radius: 12px; font-size: 14px; display: none; }
  .msg.error { background: #fdecec; color: #a32d2d; border: 1px solid #f3c2c2; display: block; }
  .result { display: none; margin-top: 22px; }
  .result .ok { text-align: center; color: #1d7a3e; font-size: 15px; margin-bottom: 10px; }
  .code-box { background: #eef4fb; border: 1px solid #b9d0e8; border-radius: 14px; padding: 16px; text-align: center; font-family: Consolas, monospace; font-size: 17px; letter-spacing: 1px; color: #0b4a8b; word-break: break-all; user-select: all; }
  .copy-btn { margin-top: 10px; background: #fff; color: #0b4a8b; border: 1px solid #0b4a8b; }
  .copy-btn:hover { background: #eef4fb; }
  .hist { margin-top: 20px; }
  .hist h3 { font-size: 14px; color: #52606d; margin-bottom: 8px; }
  .hist-item { background: #f7fafc; border: 1px solid #e3e8ee; border-radius: 12px; padding: 10px 12px; font-size: 13px; margin-bottom: 8px; }
  .hist-item div { margin: 2px 0; }
  .hist-item .k { color: #6b7a89; }
  .home-link { display: block; text-align: center; margin-top: 22px; font-size: 14px; color: #0b4a8b; text-decoration: none; }
</style>
</head>
<body>

<div class="wrap">
  <div class="logo">XP</div>
  <h1>Random XP</h1>
  <p class="sub">Get your software activation code</p>

  <div class="card">
    <label for="uid">User ID</label>
    <input id="uid" type="text" placeholder="Your customer ID" autocomplete="off">

    <label for="sn">Serial number</label>
    <input id="sn" type="text" inputmode="numeric" maxlength="25" placeholder="Shown by Random XP" autocomplete="off">

    <button id="go" onclick="getCode()">Get activation code</button>
    <div id="msg" class="msg"></div>

    <div id="result" class="result">
      <div class="ok" id="okline">&#10004; Activation code</div>
      <div class="code-box" id="codebox"></div>
      <button class="copy-btn" onclick="copyCode()">Copy code</button>
      <div class="hist" id="hist"></div>
    </div>
  </div>

  <a class="home-link" href="index.html">&#8592; Back to Random Computer Solutions</a>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
var SUPABASE_URL = "https://vbprmqhpdzlgcrwgbwof.supabase.co";
var ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZicHJtcWhwZHpsZ2Nyd2did29mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2MzkyNTEsImV4cCI6MjA5ODIxNTI1MX0.-jWJ98Q-TVCTosce48YREhRj8u-TcAlDwrTjDc67Wu0";

var serialInput = document.getElementById("sn");
serialInput.addEventListener("input", function () {
  this.value = this.value.replace(/\D/g, "").slice(0, 25);
});

function setBusy(b) {
  var btn = document.getElementById("go");
  btn.disabled = b;
  btn.textContent = b ? "Please wait…" : "Get activation code";
}
function showError(t) {
  var m = document.getElementById("msg");
  m.className = "msg error";
  m.textContent = t;
}
function clearError() {
  var m = document.getElementById("msg");
  m.className = "msg";
  m.textContent = "";
}

async function api(path, body) {
  var res = await fetch(SUPABASE_URL + "/functions/v1/" + path, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + ANON_KEY,
      "apikey": ANON_KEY
    },
    body: JSON.stringify(body)
  });
  var data = await res.json();
  if (!res.ok) throw new Error(data.error || "Something went wrong. Try again.");
  return data;
}

async function getCode() {
  clearError();
  document.getElementById("result").style.display = "none";
  var uid = document.getElementById("uid").value.trim();
  var sn = document.getElementById("sn").value.trim();
  if (!uid || !sn) { showError("Enter your user ID and serial number."); return; }
  setBusy(true);
  try {
    var data = await api("request-code", { user_id: uid, serial_no: sn });
    if (data.status === "already_paid") {
      showResult(data.activation_code, data.history, false, sn);
    } else if (data.status === "payment_required") {
      openCheckout(uid, sn, data);
    } else {
      showError("Unexpected response. Try again.");
    }
  } catch (e) {
    showError(e.message);
  } finally {
    setBusy(false);
  }
}

function openCheckout(uid, sn, order) {
  var rzp = new Razorpay({
    key: order.razorpay_key_id,
    order_id: order.order_id,
    amount: order.amount,
    currency: order.currency || "INR",
    name: "Random Computer Solutions",
    description: order.service_name || "Activation code",
    prefill: { name: order.customer_name || "" },
    theme: { color: "#0b4a8b" },
    handler: function (resp) {
      confirmPayment(uid, sn, resp, order.service_id);
    }
  });
  rzp.on("payment.failed", function () {
    showError("Payment failed or was cancelled. You have not been charged a code.");
  });
  rzp.open();
}

async function confirmPayment(uid, sn, resp, serviceId) {
  setBusy(true);
  clearError();
  try {
    var data = await api("confirm-payment", {
      user_id: uid,
      serial_no: sn,
      razorpay_order_id: resp.razorpay_order_id,
      razorpay_payment_id: resp.razorpay_payment_id,
      razorpay_signature: resp.razorpay_signature,
      service_id: serviceId
    });
    showResult(data.activation_code, data.history, true, sn);
  } catch (e) {
    showError("Payment went through but code display failed. Enter the same details again to retrieve your code free of charge. (" + e.message + ")");
  } finally {
    setBusy(false);
  }
}

function showResult(code, history, paid, currentSerial) {
  document.getElementById("okline").innerHTML = paid
    ? "&#10004; Payment successful — your activation code"
    : "&#10004; Already unlocked — your activation code (free)";
  document.getElementById("codebox").textContent = code;
  var histDiv = document.getElementById("hist");
  histDiv.innerHTML = "";
  var prev = (history || []).filter(function (h) { return h.serial_no !== currentSerial; });
  if (prev.length) {
    var html = "<h3>Previous activations</h3>";
    prev.forEach(function (h) {
      var d = h.activated_at ? new Date(h.activated_at).toLocaleDateString("en-IN", { day: "2-digit", month: "short", year: "numeric" }) : "-";
      html += '<div class="hist-item">' +
        '<div><span class="k">Serial:</span> ' + h.serial_no + "</div>" +
        '<div><span class="k">Code:</span> ' + h.activation_code + "</div>" +
        '<div><span class="k">Last activation:</span> ' + d + "</div></div>";
    });
    histDiv.innerHTML = html;
  }
  document.getElementById("result").style.display = "block";
}

function copyCode() {
  var t = document.getElementById("codebox").textContent;
  navigator.clipboard.writeText(t).then(function () {
    showErrorTemp();
  });
}
function showErrorTemp() {
  var m = document.getElementById("msg");
  m.className = "msg";
  m.style.display = "block";
  m.style.background = "#e9f6ee";
  m.style.color = "#1d7a3e";
  m.style.border = "1px solid #bfe3cc";
  m.textContent = "Code copied";
  setTimeout(function () { m.style.display = "none"; }, 1800);
}
</script>

</body>
</html>
